version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotelmate_db
      POSTGRES_USER: hotelmate
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hotelmate_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelmate -d hotelmate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DB_NAME: hotelmate_db
      DB_USER: hotelmate
      DB_PASSWORD: ${DB_PASSWORD:-hotelmate_secret}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@hotelmate.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_ACCESS_TOKEN_MINUTES: 15
      JWT_REFRESH_TOKEN_DAYS: 7
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn planova.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DB_NAME: hotelmate_db
      DB_USER: hotelmate
      DB_PASSWORD: ${DB_PASSWORD:-hotelmate_secret}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@hotelmate.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A planova worker --loglevel=info --concurrency=4

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DB_NAME: hotelmate_db
      DB_USER: hotelmate
      DB_PASSWORD: ${DB_PASSWORD:-hotelmate_secret}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A planova beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  postgres_data:
  media_data:
  static_data:
